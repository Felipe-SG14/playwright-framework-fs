name: Take home challenge - Tests

on:
  workflow_dispatch:
    inputs:
      workers:
        description: 'Number of parallel workers'
        required: false
        default: '1'
        type: string
      retries:
        description: 'Number of test retries on failure'
        required: false
        default: '0'
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  WORKERS: ${{ github.event.inputs.workers }}
  RETRIES: ${{ github.event.inputs.retries }}

permissions:
  contents: read
  checks: write

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - uses: actions/setup-node@v6
      with:
        node-version: '24'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Restore Playwright browser cache
      id: playwright-cache
      uses: actions/cache@v5
      with:
        path: ~/.cache/ms-playwright
        key: playwright-browsers-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}
        restore-keys: |
          playwright-browsers-${{ runner.os }}-

    - name: Install Playwright Browsers
      if: steps.playwright-cache.outputs.cache-hit != 'true'
      run: npx playwright install --with-deps --no-shell

    - name: Save Playwright browser cache
      if: ${{ !cancelled() }}
      uses: actions/cache@v5
      with:
        path: ~/.cache/ms-playwright
        key: playwright-browsers-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}
        restore-keys: |
          playwright-browsers-${{ runner.os }}-

    - name: Run Playwright tests
      run: npx playwright test

    - name: Publish JUnit Test Results
      uses: dorny/test-reporter@v3
      if: ${{ !cancelled() }}
      with:
        name: Playwright Test Execution Report
        path: reports/junit/junit-report.xml
        reporter: java-junit
        fail-on-error: 'false'

    - name: Publish Playwright Report Results
      uses: actions/upload-artifact@v7
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: reports/playwright-report/
        retention-days: 30